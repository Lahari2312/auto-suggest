<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Suggest</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
   
}

body{
    background:#fff;
}

/* ---------- Top Bar ---------- */

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 30px;
}

.settings{
    font-size:24px;
    cursor:pointer;
}

.status{
    font-size:18px;
}

/* ---------- Main Content ---------- */

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    margin-top:50px;
}

.being{
    color:#41a1e5;
}

.container h1{
    font-size:60px;
    margin-bottom:20px;
}

.container p{
    color:#8a8a8a;
    font-size:22px;
    margin-bottom:40px;
}

/* ---------- Search ---------- */

.search{
    display:flex;
    align-items:flex-start;
    gap:12px;
}

.search-icon{
    font-size:24px;
    margin-top:13px;
    color:#666;
}

.search-wrapper{
    position:relative;
    width:550px;
}

.search-box{
    width:100%;
    height:52px;
    padding:0 20px;
    font-size:16px;

    border:2px solid #222;
    border-radius:30px;

    outline:none;
    transition:.3s;
}

.search-box:focus{
    border-color:#41a1e5;
    box-shadow:0 0 10px rgba(65,161,229,.25);
}

.search-box::placeholder{
    color:#9d9d9d;
}

/* ---------- Suggestion Box ---------- */

.search-wrapper{
    position:relative;
    width:480px;
}

#suggestion-box{
    position:absolute;
    top:60px;
    left:0;

    width:100%;
    background:#fff;

    border:1px solid #ddd;
    box-shadow:0 8px 20px rgba(0,0,0,.12);

    display:none;

    max-height:300px;
    overflow-y:auto;

    z-index:100;
}

.suggestion{
    padding:12px 16px;
    cursor:pointer;
    text-align:left;
    border-bottom:1px solid #eee;
}

.suggestion:hover{
    background:#f3f3f3;
}
.suggestion{
    padding:12px 18px;
    cursor:pointer;
    text-align:left;
    border-bottom:1px solid #eee;
}

.suggestion:last-child{
    border-bottom:none;
}

.suggestion:hover{
    background:#f5f5f5;
}

</style>

</head>

<body>

<div class="top-bar">

    <span class="settings">&#9881;</span>

    <span class="status">
        &#x2022; Online &nbsp; | &nbsp; &#128339; - ms
    </span>

</div>

<div class="container">

    <h1><span class="being">Being</span>Infinity</h1>

    <p>
        One million phrases. Four algorithms. Prefix Based Auto Suggest.
    </p>

    <div class="search">

        <span class="search-icon">&#128269;</span>

        <div class="search-wrapper">

            <input
    id="searchInput"
    class="search-box"
    type="text"
    placeholder="Start Typing to Search">

            <div id="suggestion-box">

                
                

            </div>

        </div>

    </div>

</div>

<script>

const input = document.getElementById("searchInput");
const suggestionBox = document.getElementById("suggestion-box");

input.addEventListener("input", async () => {

    const query = input.value.trim();

    if(query === ""){
        suggestionBox.innerHTML = "";
        suggestionBox.style.display = "none";
        return;
    }

    try{

        const response = await fetch(
            `https://autosuggest-backend.onrender.com/api/autosuggest?q=${encodeURIComponent(query)}&algorithm=brute&limit=10&weighted=false`
        );

        const data = await response.json();

        suggestionBox.innerHTML = "";

        if(data.results.length === 0){
            suggestionBox.style.display = "none";
            return;
        }

        data.results.forEach(item=>{

            const div=document.createElement("div");

            div.className="suggestion";

            div.textContent=item.text;

            div.onclick=function(){

                input.value=item.text;

                suggestionBox.style.display="none";

            };

            suggestionBox.appendChild(div);

        });

        suggestionBox.style.display="block";

    }

    catch(error){

        console.error(error);

    }

});

document.addEventListener("click",function(e){

    if(!e.target.closest(".search-wrapper")){

        suggestionBox.style.display="none";

    }

});

</script>

</body>
</html>
